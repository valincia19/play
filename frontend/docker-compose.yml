services:
  frontend:
    build:
      context: .
      args:
        # Pass environment variables matching your target server setup
        - VITE_API_BASE_URL=https://api.vercelplay.com
        - VITE_APP_URL=https://vercelplay.com
        - VITE_FRONTEND_URL=https://vercelplay.com
        - VITE_SHARE_DOMAIN=verply.net
        - VITE_MAIN_DOMAIN=vercelplay.com
    container_name: vercelplay-frontend
    restart: always
    ports:
      - '80:80'
