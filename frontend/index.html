<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vercelplay</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem("vite-ui-theme") || "dark";
          if (theme === "dark" || (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
            document.documentElement.style.backgroundColor = "oklch(0.153 0.006 107.1)"; // Default dark bg to prevent white flash
          } else {
            document.documentElement.classList.remove("dark");
            document.documentElement.style.backgroundColor = "oklch(1 0 0)";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
